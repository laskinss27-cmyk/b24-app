<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>b24-app dev</title>
	</head>
	<body>
		<!-- На dev открываем эту страницу напрямую (Vite на :5173).
		     На проде она не используется — Битрикс грузит наш main.tsx
		     через iframe, который генерит backend в /placement/deal-tab. -->
		<div id="root"></div>
		<script>
			// На локальном dev контекст не приходит от Битрикса — подставляем мок.
			// ?inv в URL → мок задачи (инвентаризация), иначе → мок сделки (товары).
			if (!window.__B24_CONTEXT__) {
				var __sp = new URLSearchParams(location.search);
				var __inv = __sp.has('inv');
				var __rep = __sp.has('repairs');
				window.__B24_CONTEXT__ = __rep
					? { view: 'repairs', dealId: null, domain: 'umniydom.bitrix24.ru', memberId: null, __mock: true }
					: __inv
					? { view: 'inventory', dealId: null, domain: 'umniydom.bitrix24.ru', memberId: null, __mock: true }
					: { dealId: 32592, domain: 'umniydom.bitrix24.ru', memberId: null, __mock: true };
			}
		</script>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
