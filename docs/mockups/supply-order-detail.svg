<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="950" viewBox="0 0 1440 950">
  <defs>
    <style>
      .bg { fill: #f5f6f8; }
      .panel { fill: #ffffff; stroke: #d9dee7; stroke-width: 1; }
      .soft { fill: #fafbfc; stroke: #d9dee7; stroke-width: 1; }
      .rail { fill: #111827; }
      .railText { fill: #e5e7eb; font: 14px Arial, sans-serif; }
      .railMuted { fill: #8b95a7; font: 12px Arial, sans-serif; }
      .title { fill: #111827; font: 700 25px Arial, sans-serif; }
      .h2 { fill: #111827; font: 700 16px Arial, sans-serif; }
      .h3 { fill: #111827; font: 700 14px Arial, sans-serif; }
      .text { fill: #374151; font: 13px Arial, sans-serif; }
      .small { fill: #6b7280; font: 12px Arial, sans-serif; }
      .tiny { fill: #6b7280; font: 11px Arial, sans-serif; }
      .head { fill: #6b7280; font: 700 11px Arial, sans-serif; letter-spacing: .4px; }
      .line { stroke: #e5e7eb; stroke-width: 1; }
      .input { fill: #fff; stroke: #cfd6e3; }
      .btn { fill: #1f6feb; }
      .btnText { fill: #fff; font: 700 13px Arial, sans-serif; }
      .ghost { fill: #fff; stroke: #cfd6e3; }
      .warn { fill: #fff7ed; stroke: #fed7aa; }
      .warnText { fill: #9a3412; font: 700 11px Arial, sans-serif; }
      .ok { fill: #ecfdf5; stroke: #bbf7d0; }
      .okText { fill: #047857; font: 700 11px Arial, sans-serif; }
      .bad { fill: #fef2f2; stroke: #fecaca; }
      .badText { fill: #b91c1c; font: 700 11px Arial, sans-serif; }
      .chip { fill: #eef2ff; stroke: #c7d2fe; }
      .chipText { fill: #3730a3; font: 700 11px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="950"/>

  <rect class="rail" x="0" y="0" width="248" height="950"/>
  <rect x="24" y="28" width="36" height="36" rx="6" fill="#1f6feb"/>
  <text x="74" y="43" class="railText" style="font-weight:700;font-size:17px">Снаб</text>
  <text x="74" y="60" class="railMuted">рабочее место</text>
  <text x="24" y="110" class="railMuted">ОПЕРАЦИИ</text>
  <rect x="14" y="126" width="220" height="38" rx="6" fill="#24324a"/>
  <text x="30" y="150" class="railText" style="font-weight:700">Заявки</text>
  <text x="30" y="190" class="railText">Логистика</text>
  <text x="30" y="228" class="railText">Закупки</text>
  <text x="30" y="266" class="railText">Согласование оплат</text>
  <text x="24" y="326" class="railMuted">СКЛАД</text>
  <text x="30" y="366" class="railText">Документы склада</text>
  <text x="30" y="404" class="railText">Остатки</text>
  <text x="30" y="442" class="railText">Движение товара</text>

  <text x="280" y="48" class="small">Заявки / MR-2026-0142</text>
  <text x="280" y="80" class="title">MR-2026-0142 · Монтаж видеонаблюдения</text>
  <text x="280" y="104" class="small">Сделка #37004 · клиент: Литейный 12 · создано сегодня, 10:52 · ответственный: Даниил Андропов</text>
  <rect class="warn" x="1244" y="54" width="92" height="26" rx="13"/>
  <text x="1266" y="72" class="warnText">новая</text>

  <rect class="ghost" x="280" y="128" width="128" height="34" rx="6"/>
  <text x="316" y="150" class="text" style="font-weight:700">Назад</text>
  <rect class="ghost" x="420" y="128" width="150" height="34" rx="6"/>
  <text x="448" y="150" class="text" style="font-weight:700">Открыть сделку</text>
  <rect class="btn" x="1136" y="128" width="200" height="34" rx="6"/>
  <text x="1166" y="150" class="btnText">Создать документы</text>

  <rect class="panel" x="280" y="190" width="1056" height="86" rx="8"/>
  <text x="304" y="222" class="h2">Сводка</text>
  <text x="304" y="250" class="text">3 позиции · распределено 4 из 11 шт · основные строки показывают остаток к выбору</text>
  <rect class="warn" x="1050" y="220" width="250" height="26" rx="13"/>
  <text x="1086" y="238" class="warnText">есть нераспределенные остатки</text>

  <rect class="panel" x="280" y="300" width="1056" height="590" rx="8"/>
  <text x="304" y="330" class="h2">Позиции заявки</text>
  <text x="304" y="352" class="small">Выбираешь количество, действие и склад. После добавления эта часть уходит дочерней строкой, а в основной остается остаток.</text>
  <line class="line" x1="280" y1="372" x2="1336" y2="372"/>

  <text x="304" y="398" class="head">ПОЗИЦИЯ</text>
  <text x="574" y="398" class="head">ОСТАЛОСЬ</text>
  <text x="690" y="398" class="head">ОСТАТКИ</text>
  <text x="850" y="398" class="head">КОЛ-ВО</text>
  <text x="930" y="398" class="head">ДЕЙСТВИЕ</text>
  <text x="1090" y="398" class="head">СКЛАД</text>
  <text x="1240" y="398" class="head"></text>

  <rect x="292" y="414" width="1032" height="54" rx="6" fill="#f8fafc" stroke="#bfdbfe"/>
  <text x="304" y="440" class="h3">IP-камера 4 Мп</text>
  <text x="304" y="460" class="tiny">основная строка: осталось распределить</text>
  <text x="574" y="448" class="text" style="font-weight:700">3 из 6</text>
  <text x="690" y="448" class="text">есть 3 на 2 складах</text>
  <rect class="input" x="850" y="423" width="58" height="32" rx="5"/>
  <text x="872" y="444" class="text">3</text>
  <rect class="input" x="930" y="423" width="132" height="32" rx="5"/>
  <text x="950" y="444" class="text">Перемещение</text>
  <rect class="input" x="1090" y="423" width="120" height="32" rx="5"/>
  <text x="1110" y="444" class="text">Офис</text>
  <rect class="btn" x="1240" y="423" width="70" height="32" rx="6"/>
  <text x="1258" y="444" class="btnText">Добавить</text>

  <rect x="326" y="480" width="998" height="38" rx="5" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="350" y="504" class="text">↳ 3 шт · Перемещение · Парнас → ТТ</text>
  <rect class="chip" x="1138" y="488" width="82" height="22" rx="11"/>
  <text x="1154" y="504" class="chipText">черновик</text>
  <text x="1244" y="504" class="small">удалить</text>

  <line class="line" x1="292" y1="538" x2="1324" y2="538"/>
  <text x="304" y="568" class="h3">Регистратор 8 каналов</text>
  <text x="304" y="586" class="tiny">основная строка закрыта</text>
  <text x="574" y="576" class="text" style="font-weight:700">0 из 1</text>
  <text x="690" y="576" class="text">есть 4 на 1 складе</text>
  <rect class="ok" x="850" y="556" width="132" height="24" rx="12"/>
  <text x="868" y="573" class="okText">готово</text>

  <rect x="326" y="602" width="998" height="38" rx="5" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="350" y="626" class="text">↳ 1 шт · Перемещение · Офис → ТТ</text>
  <rect class="chip" x="1138" y="610" width="82" height="22" rx="11"/>
  <text x="1154" y="626" class="chipText">черновик</text>
  <text x="1244" y="626" class="small">удалить</text>

  <line class="line" x1="292" y1="660" x2="1324" y2="660"/>
  <text x="304" y="690" class="h3">Блок питания 12В 5А</text>
  <text x="304" y="708" class="tiny">основная строка: осталось распределить</text>
  <text x="574" y="698" class="text" style="font-weight:700">4 из 4</text>
  <text x="690" y="698" class="badText">нет на складах</text>
  <rect class="input" x="850" y="678" width="58" height="32" rx="5"/>
  <text x="872" y="699" class="text">4</text>
  <rect class="input" x="930" y="678" width="132" height="32" rx="5"/>
  <text x="950" y="699" class="text">Закупка</text>
  <rect class="soft" x="1090" y="678" width="120" height="32" rx="5"/>
  <text x="1118" y="699" class="small">не нужен</text>
  <rect class="btn" x="1240" y="678" width="70" height="32" rx="6"/>
  <text x="1258" y="699" class="btnText">Добавить</text>

  <rect class="soft" x="304" y="756" width="1008" height="92" rx="6"/>
  <text x="326" y="786" class="h2">Итог после добавления</text>
  <text x="326" y="812" class="text">Дочерние строки станут основой для документов. Если удалить дочернюю строку, количество вернется в основную.</text>
  <rect class="chip" x="326" y="826" width="188" height="26" rx="13"/>
  <text x="344" y="844" class="chipText">Перемещение Парнас → ТТ</text>
  <rect class="chip" x="532" y="826" width="174" height="26" rx="13"/>
  <text x="550" y="844" class="chipText">Перемещение Офис → ТТ</text>
  <rect class="warn" x="726" y="826" width="122" height="26" rx="13"/>
  <text x="746" y="844" class="warnText">Закупка 4 шт</text>
</svg>
