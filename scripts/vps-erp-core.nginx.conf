# Буфер перед ssh-туннелем к ядру ERPNext на ноутбуке (см. scripts/erp-bridge.ps1).
# Копия на VPS 194.226.97.154: /etc/nginx/conf.d/erp-core.conf  (nginx уже стоит под ISPmanager на :80).
#
# Зачем: прод-бэкенд на Y.Cloud (undici/fetch) виснет на успешных ответах frappe через голый
# реверс-туннель — ждёт конец потока без чёткого Content-Length (ping и ошибки проходят, данные нет).
# curl тот же путь читает за ~120мс. nginx ведёт себя как curl: дочитывает ответ апстрима до конца
# и отдаёт клиенту чистый Content-Length + Connection: close — ровно то, чего undici не хватало.
#
# Топология: туннель отдаёт VPS 127.0.0.1:8081 -> ноут localhost:8080; nginx слушает 0.0.0.0:18080.
# Прод ходит на http://194.226.97.154:18080 (= nginx), ERPNEXT_URL не менялся.
# Откат: systemctl stop nginx + вернуть -R 0.0.0.0:18080:localhost:8080 в erp-bridge.ps1.
#
# Применение на VPS:
#   scp scripts/vps-erp-core.nginx.conf root@194.226.97.154:/etc/nginx/conf.d/erp-core.conf
#   ssh root@194.226.97.154 'nginx -t && systemctl reload nginx'

server {
    listen 18080;
    server_name _;
    keepalive_timeout 0;                 # Connection: close клиенту (undici) — никакого ожидания keep-alive

    location / {
        proxy_pass http://127.0.0.1:8081; # ssh-туннель -> localhost:8080 ноутбука (frappe frontend)
        proxy_set_header Host $http_host;  # сохраняем Host как при прямом обращении (резолв сайта frappe)
        proxy_buffering on;                # полностью буферизуем ответ апстрима
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
